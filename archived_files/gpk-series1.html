<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Pail Kids Series 1 - Pack Opener</title>
    <link rel="stylesheet" href="style.css">
    <script src="load-header.js"></script>
    <style>
        :root {
            --gold: #ff6b00;
            --gold-light: #ffaa55;
            --border: #ddd8cf;
        }

        .card {
            border-color: var(--gold);
        }

        .card:hover {
            box-shadow: 0 10px 32px rgba(255, 107, 0, .3);
        }

        .col-pair {
            display: contents;
        }

        .col-slot.a-slot {
            border-left: 3px solid #ff6b00;
        }

        .col-slot.b-slot {
            border-left: 3px solid #cc44cc;
        }

        #collectionGrid {

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));

            gap: .6rem;
        }
    </style>
</head>

<body>

    <header id="global-header" data-main="Garbage Pail Kids" data-sub="1985 Series 1 &middot; Topps"></header>

    <div class="pack-section">
        <div class="pack-row">
            <div class="pack-wrapper" id="packWrapper">
                <div class="pack" id="pack">
                    <div
                        style="width:100%;height:100%;background:linear-gradient(165deg,#1a0020 0%,#4a0060 50%, #1a0020 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;">
                        <div
                            style="font-family:Georgia,serif;font-size:2rem;font-weight:900;color:#ff6b00;text-shadow:0 0 14px rgba(255,107,0,.7);line-height:1;text-align:center;letter-spacing:.05em">
                            GPK</div>
                        <div
                            style="font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:#cc88ff;margin-top:.5rem">
                            Garbage Pail Kids</div>
                        <div style="font-size:.48rem;letter-spacing:.12em;color:#ff6b00;margin-top:.3rem">1985 &middot;
                            Series 1</div>
                    </div>
                </div>
            </div>
            <div class="pack-counter">
                <span class="counter-num" id="packsTotal">0</span>
                <span class="counter-label">Total Packs<br>Opened</span>
                <span class="counter-divider"></span>
                <span class="counter-num counter-num--session" id="packsSession">0</span>
                <span class="counter-label">This<br>Session</span>
            </div>
        </div>
        <button class="open-btn" id="openBtn" onclick="openPack()">Open Pack</button>
        <span class="pack-label" id="packLabel"></span>
        <p class="pack-instructions">Drag across the pack to tear it open,<br>or click the button above.</p>
    </div>

    <div class="section-divider" id="divider"><span>Stickers Pulled</span></div>

    <div class="cards-section" id="cardsSection">
        <div>
            <div class="row-label">Series 1 &mdash; 5 stickers per pack &middot; click to view back</div>
            <div class="cards-row" id="slots-base"></div>
        </div>
    </div>

    <div class="collection-section">
        <div class="collection-header">
            <div>
                <h2 class="collection-title">Collection</h2>
                <p class="collection-sub">82 stickers &mdash; 41 pairs (a &amp; b variants)</p>
            </div>
            <span class="collection-count" id="collectionCount">0 / 82</span>
        </div>
        <div class="collection-grid" id="collectionGrid"></div>
    </div>

    <script src="script-gpk1.js"></script>

    <div id="lightbox" onclick="closeLightbox()">
        <button id="lightbox-close" onclick="closeLightbox()">&times;</button>
        <img id="lightbox-front" src="" alt="">
        <img id="lightbox-back" src="" alt="">
    </div>

</body>

</html>
